server:
  port: 4555

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      show-components: always

  health:
    ping:
      enabled: false
    ssl:
      enabled: false
    refresh:
      enabled: false
  endpoints:
    web:
      base-path: /
      exposure:
        include: health

spring:
  cloud:
      discovery:
        client:
          health-indicator:
            enabled: false
  application:
    name: PCQ Consolidation Service
  config:
    import: "optional:configtree:/mnt/secrets/pcq/"

core_case_data:
  api:
    url: ${CORE_CASE_DATA_API_URL:http://localhost:4452}

idam:
  s2s-auth:
    url:    ${S2S_URL:http://localhost:4502}
    secret: ${S2S_SECRET}
    name:   ${S2S_NAME:pcq_consolidation_service}
  api:
    url: ${IDAM_API_URL:http://localhost:5000}
  client:
    id: ${IDAM_CLIENT_NAME:ccd_gateway}
    secret: ${IDAM_CLIENT_SECRET}
    redirect_uri: ${IDAM_CLIENT_REDIRECT_URI:http://localhost:3451/oauth2redirect}
  users:
    pcq:
      username: ${IDAM_USERS_PCQ_USERNAME:pcq.extractor.ccd@gmail.com}
      password: ${IDAM_USERS_PCQ_PASSWORD}

service-config:
  services:
    - service: probate
      case-dcn-document-mapping: scannedDocuments.value.controlNumber
      case-field-mappings:
        - actor: APPLICANT
          name: pcqId
      case-type-ids:
        - Caveat
        - GrantOfRepresentation
    - service: divorce
      case-field-mappings:
        - actor: PETITIONER
          name: PetitionerPcqId
        - actor: RESPONDENT
          name: RespondentPcqId
        - actor: CORESPONDENT
          name: CoRespondentPcqId
      case-type-ids:
        - DIVORCE
    - service: cmc
      case-field-mappings:
        - actor: CLAIMANT
          name: applicants.value.pcqId
        - actor: DEFENDANT
          name: respondents.value.pcqId
      case-type-ids:
        - MoneyClaimCase
    - service: sscs
      case-dcn-document-mapping: sscsDocument.value.documentFileName
      case-dcn-document-suffix: .pdf
      case-field-mappings:
        - actor: APPELLANT
          name: pcqId
      case-type-ids:
        - Benefit
    - service: civil-citizen-ui
      case-field-mappings:
        - actor: APPLICANT
          name: pcqId
      case-type-ids:
        - CIVIL

smoke.test.enabled: false

pcqBackendUrl: ${PCQ_BACKEND_URL:http://localhost:4550}

feign:
  allow:
    headers:
      - x-correlation-id

coRelationId: PCQ Consolidation Service
